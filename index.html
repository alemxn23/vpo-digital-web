<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>VPO Digital — Valoración Preoperatoria | vpo.mx</title>
  <meta name="description"
    content="Plataforma digital de Valoración Preoperatoria para médicos internistas y anestesiólogos. Escalas de riesgo automatizadas, PDF institucional y nota médica en segundos." />
  <meta name="author" content="Med-Tech Labs" />
  <link rel="canonical" href="https://vpo.mx" />
  <!-- Open Graph -->
  <meta property="og:title" content="VPO Digital — Valoración Preoperatoria" />
  <meta property="og:description"
    content="Genera VPOs completas con 14 escalas de riesgo validadas, PDF institucional y nota médica automática." />
  <meta property="og:url" content="https://vpo.mx" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Identity Services & API Client -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            imss: {
              green: '#137759',
              gold: '#B38E5D'
            },
            clinical: {
              navy: '#1e3a8a', // Azul Marino
              red: '#b91c1c',  // Rojo Alerta
              bg: '#f8fafc'
            }
          }
        },
      },
    }
  </script>
  <style>
    @media print {
      @page {
        size: letter;
        margin: 0.5cm;
      }

      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }
    }

    .print-only {
      display: none;
    }

    /* Custom scrollbar for clinical look */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Synapse Animation */
    @keyframes synapse {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      20% {
        opacity: 0.8;
        transform: scale(1.5);
        box-shadow: 0 0 4px rgba(50, 200, 255, 0.6);
      }

      40% {
        opacity: 0;
        transform: scale(0.5);
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes fadeInSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-clinical-enter {
      animation: fadeInSlideUp 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-clinical-bg text-slate-800">
  <div id="root"></div>
  <script>
    // FORCE CACHE CLEARING STRATEGY
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker Warning: Unregistered to force update.');
        }
      });

      // Optional: Force reload if we detect it was controlled
      // if (navigator.serviceWorker.controller) {
      //   window.location.reload(); 
      // }
    }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
